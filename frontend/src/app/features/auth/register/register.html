<section class="auth-page">
  <div class="auth-card">
    <div class="auth-intro"><span class="eyebrow">Nueva cuenta</span><h1>Regístrate como cliente</h1><p>Después podrás solicitar también el rol de propietario.</p></div>
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <small class="required-legend">Campos obligatorios</small>
      <label for="register-name"><span>Nombres completos *</span><input id="register-name" formControlName="fullName" aria-required="true" autocomplete="name">@if (form.controls.fullName.touched && form.controls.fullName.invalid) { <small class="error-msg" role="alert">Ingresa al menos 3 caracteres.</small> }</label>
      <label for="register-email"><span>Correo electrónico *</span><input id="register-email" type="email" formControlName="email" aria-required="true" autocomplete="email">@if (form.controls.email.touched && form.controls.email.invalid) { <small class="error-msg" role="alert">Ingresa un correo válido.</small> }</label>
      <label for="register-phone"><span>Teléfono *</span><input id="register-phone" appDigitsOnly inputmode="numeric" maxlength="10" formControlName="phone" aria-required="true" autocomplete="tel">@if (form.controls.phone.touched && form.controls.phone.invalid) { <small class="error-msg" role="alert">Ingresa un teléfono de 9 o 10 dígitos.</small> }</label>
      <label for="register-password"><span>Contraseña *</span><div class="password-field"><input id="register-password" [type]="showPassword() ? 'text' : 'password'" maxlength="72" formControlName="password" aria-required="true" autocomplete="new-password"><button class="password-toggle" type="button" (click)="showPassword.update(value => !value)" [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'" [title]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"><lucide-icon [img]="showPassword() ? EyeOffIcon : EyeIcon" [size]="20" /></button></div>@if (form.controls.password.touched && form.controls.password.invalid) { <small class="error-msg" role="alert">La contraseña debe tener entre 6 y 72 caracteres.</small> }</label>
      <label for="register-confirm-password"><span>Confirmar contraseña *</span><div class="password-field"><input id="register-confirm-password" [type]="showConfirmation() ? 'text' : 'password'" maxlength="72" formControlName="confirmPassword" aria-required="true" autocomplete="new-password"><button class="password-toggle" type="button" (click)="showConfirmation.update(value => !value)" [attr.aria-label]="showConfirmation() ? 'Ocultar confirmación' : 'Mostrar confirmación'" [title]="showConfirmation() ? 'Ocultar confirmación' : 'Mostrar confirmación'"><lucide-icon [img]="showConfirmation() ? EyeOffIcon : EyeIcon" [size]="20" /></button></div>@if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')) { <small class="error-msg" role="alert">Confirma tu contraseña.</small> } @else if (form.controls.confirmPassword.touched && form.hasError('fieldsMismatch')) { <small class="error-msg" role="alert">Las contraseñas no coinciden.</small> }</label>
      <label class="checkbox" for="register-accept"><input id="register-accept" type="checkbox" formControlName="accept" aria-required="true"><span>Acepto los términos de uso de LojaVents.</span></label>
      @if (form.controls.accept.touched && form.controls.accept.invalid) { <small class="error-msg" role="alert">Debes aceptar los términos para continuar.</small> }
      <button class="btn btn-primary full" type="submit" [disabled]="loading()">{{ loading() ? 'Creando cuenta...' : 'Crear cuenta' }}</button>
    </form>
    <p class="switch">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</section>
