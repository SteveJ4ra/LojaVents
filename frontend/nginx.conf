# HTTP: se conserva el endpoint interno de salud y se redirige el resto a HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name localhost 127.0.0.1 _;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: sirve Angular y actúa como proxy inverso de la API.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost 127.0.0.1 _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; connect-src 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

    # No se habilita HSTS en localhost porque el certificado es de desarrollo.
    # En producción, con un certificado público válido, se puede añadir:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|webp|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
