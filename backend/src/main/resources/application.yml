spring:
  application:
    name: lojavents-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:lojavents}
    username: ${POSTGRES_USER:lojavents}
    password: ${POSTGRES_PASSWORD:lojavents_dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mongodb:
    uri: mongodb://${MONGO_USER:lojavents}:${MONGO_PASSWORD:lojavents_dev}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:lojavents_logs}?authSource=admin

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  forward-headers-strategy: framework
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

security:
  jwt:
    issuer: lojavents-backend
    secret: ${JWT_SECRET:CAMBIA_ESTE_SECRETO_DE_DESARROLLO_POR_UNO_DE_32_CARACTERES_O_MAS}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: INFO
